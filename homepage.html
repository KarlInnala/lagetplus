    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 1.5s ease; /* Här bestäms hur lång uttoningen är */
">

<header class="hero" style="text-align: center; padding: 100px 10%; background: linear-gradient(135deg, #f9fbff 0%, #e6f0ff 100%);">

<script>
    const introDiv = document.getElementById('video-intro');
    const video = document.getElementById('intro-video');

    // När videon har spelat klart...
    video.onended = function() {
        // 1. Starta uttoningen (ändra opacity till 0)
        introDiv.style.opacity = '0';

        // 2. Vänta tills CSS-transitionen (1.5s) är klar, ta sedan bort diven helt
        setTimeout(() => {
            introDiv.style.display = 'none';
        }, 1500);
    };

    // Backup: Om videon mot förmodan inte laddar, låt inte användaren fastna på svart skärm
    video.onerror = function() {
        introDiv.style.display = 'none';
    };
</script>
