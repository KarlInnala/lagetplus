<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bäverspelet™. Bli en äkta stocks-magnat!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: #003087; margin-bottom: 5px; }
        .subtitle { color: #666; font-style: italic; margin-top: 0; }

        #game-area {
            position: relative;
            width: 480px;
            height: 600px;
            background-color: #3498db;
            border: 5px solid #0070ba;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        #beaver, .log, .obstacle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #beaver {
            width: 80px; height: 80px;
            background-image: url('beaver-removebg-preview.png');
            z-index: 10;
        }

        .log {
            width: 100px; height: 40px;
            background-image: url('trästock-removebg-preview.png');
        }

        .obstacle {
            width: 80px; height: 80px;
            background-image: url('skvader-removebg-preview.png');
        }

        .stats {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 480px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .stat-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 10px;
        }
        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }
        button {
            padding: 10px 25px;
            background-color: #0070ba;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Bäverspelet™</h1>
        <p class="subtitle">Samla stocks med bävern och öka ditt marknadsvärde!</p>
        
        <div id="game-area">
            <div id="beaver"></div>
        </div>

        <div class="stats">
            <div class="stat-row">
                <div class="stat-box">Marknadsvärde: <span id="score">0:-</span></div>
                <div class="stat-box">Status: <span id="rank">Praktikant</span></div>
            </div>
            <button id="reset-btn" onclick="manualReset()" style="background-color: #e74c3c;">
                Starta om
            </button>
        </div>
    </div>

    <script>
        const bgMusic = new Audio('befälhavaren.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.5;
        
        const gameArea = document.getElementById("game-area");
        const beaverDiv = document.getElementById("beaver");
        const scoreBoard = document.getElementById("score");
        const rankDisplay = document.getElementById("rank");

        const AREA_WIDTH = 480;
        const AREA_HEIGHT = 600;
        const GRID_SIZE = 40;

        let beaver = { x: AREA_WIDTH / 2 - 40, y: AREA_HEIGHT - 90, width: 80, height: 80 };
        let score = 0;
        let gameActive = false;
        let objectsInterval;
        let logs = [];
        let obstacles = [];

        function init() {
            gameActive = true;
            bgMusic.playbackRate = 1.0;
            bgMusic.play().catch(e => console.log("Musik startar vid interaktion"));
            
            score = 0;
            scoreBoard.innerText = "0:-";
            rankDisplay.innerText = "Färsking";
            
            beaver.x = AREA_WIDTH / 2 - 40;
            beaver.y = AREA_HEIGHT - 90;
            updateBeaverPosition();

            logs.forEach(log => log.element.remove());
            obstacles.forEach(ob => ob.element.remove());
            logs = [];
            obstacles = [];

            clearInterval(objectsInterval);
            objectsInterval = setInterval(generateObjects, 1500);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;

            // VIKTIGT: Hämta multipliern i realtid varje frame
            let speedMultiplier = bgMusic.playbackRate || 1;

            // 1. Flytta stockar och uppdatera deras logiska position (y)
            logs.forEach(log => {
                log.y += 3 * speedMultiplier; 
                log.element.style.top = log.y + "px";
            });

            // 2. Flytta skvadrar och uppdatera deras logiska position (y)
            obstacles.forEach(ob => {
                ob.y += 4 * speedMultiplier; 
                // Hitboxen är centrerad (y+20), så vi ritar bilden 20px ovanför hitboxen
                ob.element.style.top = (ob.y - 0) + "px"; 
            });

            checkCollisions();

            // 4. Städa upp objekt som lämnat skärmen
            logs = logs.filter(log => {
                if (log.y > AREA_HEIGHT + 100) {
                    log.element.remove();
                    return false;
                }
                return true;
            });
            obstacles = obstacles.filter(ob => {
                if (ob.y > AREA_HEIGHT + 100) {
                    ob.element.remove();
                    return false;
                }
                return true;
            });

            requestAnimationFrame(gameLoop);
        }

        function generateObjects() {
            if (!gameActive) return;
            createObject(true);
            if (Math.random() < 0.5) createObject(false);
        }

        function createObject(isLog) {
            const newElement = document.createElement("div");
            newElement.className = isLog ? "log" : "obstacle";
            
            const visualWidth = isLog ? 100 : 80;
            const randomX = Math.random() * (AREA_WIDTH - visualWidth);
            
            newElement.style.left = randomX + "px";
            newElement.style.top = "-100px";
            gameArea.appendChild(newElement);

            if (isLog) {
                // Stockens hitbox matchar bilden
                logs.push({ element: newElement, x: randomX, y: -100, width: 100, height: 40 });
            } else {
                // Skvaderns hitbox är halverad (40x40) och centrerad i 80x80 bilden
                obstacles.push({ 
                    element: newElement, 
                    x: randomX + 20, 
                    y: -100 + 20, 
                    width: 40, 
                    height: 40 
                });
            }
        }
		
		function createObject(isLog) {
    const newElement = document.createElement("div");
    newElement.className = isLog ? "log" : "obstacle";
    
    // CSS-storleken förblir densamma (det användaren ser)
    const visualWidth = isLog ? 100 : 80;
    const visualHeight = isLog ? 40 : 80;
    
    const randomX = Math.random() * (AREA_WIDTH - visualWidth);
    newElement.style.left = randomX + "px";
    newElement.style.top = "-100px";
    
    gameArea.appendChild(newElement);

    if (isLog) {
        logs.push({ element: newElement, x: randomX, y: -100, width: visualWidth, height: visualHeight });
    } else {
        // HÄR HALVERAR VI HITBOXEN (40x40 istället för 80x80)
        // Vi lägger till en offset (20px) så att hitboxen hamnar i mitten av bilden
        obstacles.push({ 
            element: newElement, 
            x: randomX + 20, // Flyttar hitboxen till mitten horisontellt
            y: -100 + 20,    // Flyttar hitboxen till mitten vertikalt
            width: 40, 
            height: 40 
        });
    }
}

        function checkCollisions() {
            logs.forEach((log, index) => {
                if (isColliding(beaver, log)) {
                    score += 50;
                    scoreBoard.innerText = score + ":-";
                    
                    // REALTIID: Här ändrar vi musikens fart, vilket gameLoop plockar upp nästa frame
                    bgMusic.playbackRate = Math.min(bgMusic.playbackRate + 0.02, 3.0);
                    
                    log.element.remove();
                    logs.splice(index, 1);
                    new Audio('masen.mp3').play();
                    updateRank();
                }
            });

            obstacles.forEach(ob => {
                if (isColliding(beaver, ob)) {
                    gameOver("Krock med skvader! Administrationsavgift tillämpad.");
                }
            });
        }

        function isColliding(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function updateRank() {
            if (score >= 200) rankDisplay.innerText = "Nybörjar-gnagare";
            if (score >= 500) rankDisplay.innerText = "Certifierad stocks-arkitekt";
            if (score >= 1000) rankDisplay.innerText = "Senior stocks-disruptör";
            if (score >= 2000) rankDisplay.innerText = "Mythical Overlord of the stocks";
            if (score >= 5000) rankDisplay.innerText = "Örtugens Personliga stocks-konsult";
        }

        function gameOver(msg) {
            gameActive = false;
            bgMusic.pause();
            bgMusic.currentTime = 0;
            clearInterval(objectsInterval);
            alert(msg + "\nDin slutliga donation: " + score + ":-");
            init();
        }

        function manualReset() {
            bgMusic.pause();
            bgMusic.currentTime = 0;
            bgMusic.playbackRate = 1.0; 
            clearInterval(objectsInterval);
            logs.forEach(log => log.element.remove());
            obstacles.forEach(ob => ob.element.remove());
            logs = [];
            obstacles = [];
            init();
        }

        window.addEventListener("keydown", (e) => {
            if (!gameActive) return;
            if (e.key === "ArrowUp" && beaver.y > 0) beaver.y -= GRID_SIZE;
            if (e.key === "ArrowDown" && beaver.y < AREA_HEIGHT - beaver.height) beaver.y += GRID_SIZE;
            if (e.key === "ArrowLeft" && beaver.x > 0) beaver.x -= GRID_SIZE;
            if (e.key === "ArrowRight" && beaver.x < AREA_WIDTH - beaver.width) beaver.x += GRID_SIZE;
            updateBeaverPosition();
        });

        function updateBeaverPosition() {
            beaverDiv.style.left = beaver.x + "px";
            beaverDiv.style.top = beaver.y + "px";
        }

        init();
    </script>
</body>
</html>
