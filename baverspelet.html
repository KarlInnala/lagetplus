<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bäverspelet™. Bli en äkta stocks-magnat!</title>
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: #003087; margin-bottom: 5px; }
        .subtitle { color: #666; font-style: italic; margin-top: 0; }

        #game-area {
            position: relative;
            width: 480px;
            height: 600px;
            background-color: #3498db;
            border: 5px solid #0070ba;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Spelobjekten */
        #beaver, .log, .obstacle {
            position: absolute;
            background-size: cover; /* Ändrat till cover för bättre centrerat ansikte */
            background-repeat: no-repeat;
            background-position: center;
        }

        #beaver {
            width: 80px; height: 80px;
            background-image: url('beaver-removebg-preview.png');
            z-index: 10;
        }

        .log {
            width: 100px; height: 40px;
            background-image: url('trästock-removebg-preview.png');
        }

        .obstacle {
            width: 80px; height: 80px;
            background-image: url('skvader-removebg-preview.png');
        }

        .stats {
            display: flex;
            justify-content: space-around;
            width: 480px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Bäverspelet™</h1>
        <p class="subtitle">Samla stocks med bävern och öka ditt marknadsvärde!</p>
        
        <div id="game-area">
            <div id="beaver"></div>
        </div>

        <div class="stats">
            <div class="stat-box">Marknadsvärde: <span id="score">0:-</span></div>
            <div class="stat-box">Status: <span id="rank">Praktikant</span></div>
        </div>

        <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
            Styr med piltangenterna. Undvik skvadrarna – de gillar inte tillväxter!
        </p>
    </div>

    <script>
        const bgMusic = new Audio('befälhavaren.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.5;
        
        const gameArea = document.getElementById("game-area");
        const beaverDiv = document.getElementById("beaver");
        const scoreBoard = document.getElementById("score");
        const rankDisplay = document.getElementById("rank");
        const masenSound = new Audio('masen.mp3');

        const AREA_WIDTH = 480;
        const AREA_HEIGHT = 600;
        const GRID_SIZE = 40;

        let beaver = { x: AREA_WIDTH / 2 - 50, y: AREA_HEIGHT - 110, width: 100, height: 100 };
        let score = 0;
        let gameActive = false;
        let objectsInterval;
        let logs = [];
        let obstacles = [];

        function init() {
            gameActive = true;
            bgMusic.playbackRate = 1.0; // Återställer hastigheten vid start
            bgMusic.play().catch(e => console.log("Musik kräver klick för att starta"));
            
            score = 0;
            scoreBoard.innerText = "0:-";
            rankDisplay.innerText = "Färsking";
            
            beaver.x = AREA_WIDTH / 2 - 50;
            beaver.y = AREA_HEIGHT - 110;
            updateBeaverPosition();

            logs.forEach(log => log.element.remove());
            obstacles.forEach(ob => ob.element.remove());
            logs = [];
            obstacles = [];

            clearInterval(objectsInterval);
            objectsInterval = setInterval(generateObjects, 1500);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;

            // Realtids-acceleration från musiken
            let speedMultiplier = bgMusic.playbackRate || 1;

            logs.forEach(log => {
                log.y += 3 * speedMultiplier; 
                log.element.style.top = log.y + "px";
            });

            obstacles.forEach(ob => {
                ob.y += 4 * speedMultiplier; 
                ob.element.style.top = ob.y + "px";
            });

            checkCollisions();

            logs = logs.filter(log => {
                if (log.y > AREA_HEIGHT) {
                    log.element.remove();
                    return false;
                }
                return true;
            });
            obstacles = obstacles.filter(ob => {
                if (ob.y > AREA_HEIGHT) {
                    ob.element.remove();
                    return false;
                }
                return true;
            });

            requestAnimationFrame(gameLoop);
        }

        function generateObjects() {
            if (!gameActive) return;
            createObject(true);
            if (Math.random() < 0.5) createObject(false);
        }

        function createObject(isLog) {
            const newElement = document.createElement("div");
            newElement.className = isLog ? "log" : "obstacle";
            
            const currentWidth = isLog ? 150 : 110;
            const randomX = Math.random() * (AREA_WIDTH - currentWidth);
            newElement.style.left = randomX + "px";
            newElement.style.top = "-120px";
            
            gameArea.appendChild(newElement);

            if (isLog) {
                logs.push({ element: newElement, x: randomX, y: -120, width: 150, height: 60 });
            } else {
                obstacles.push({ element: newElement, x: randomX, y: -120, width: 110, height: 110 });
            }
        }

        function checkCollisions() {
            logs.forEach((log, index) => {
                if (isColliding(beaver, log)) {
                    score += 50;
                    scoreBoard.innerText = score + ":-";
                    
                    // Öka musikhastigheten i realtid
                    bgMusic.playbackRate = Math.min(bgMusic.playbackRate + 0.02, 3.0);
                    
                    log.element.remove();
                    logs.splice(index, 1);
                    
                    // Polyfoniskt ljud (kan spelas flera samtidigt)
                    let soundInstance = new Audio('masen.mp3');
                    soundInstance.play();
                    
                    updateRank();
                }
            });

            obstacles.forEach(ob => {
                if (isColliding(beaver, ob)) {
                    gameOver("OBS! Krock med skvader. Administrationsavgift: 100% av ditt stocksvärde.");
                }
            });
        }

        function isColliding(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function updateRank() {
            if (score >= 200) rankDisplay.innerText = "Nybörjar-gnagare";
            if (score >= 500) rankDisplay.innerText = "Certifierad stocks-arkitekt";
            if (score >= 1000) rankDisplay.innerText = "Senior stocks-disruptör";
            if (score >= 2000) rankDisplay.innerText = "Mythical Overlord of the stocks";
            if (score >= 5000) rankDisplay.innerText = "Örtugens Personliga stocks-konsult";
        }

        function gameOver(msg) {
            gameActive = false;
            bgMusic.pause();
            bgMusic.currentTime = 0;
            clearInterval(objectsInterval);
            alert("MARKNADSVÄRDET PÅ DINA STOCKS KOLLAPSADE!\n\n" + msg + "\n\nDin slutliga donation: " + score + ":-");
            init();
        }

        window.addEventListener("keydown", (e) => {
            if (!gameActive) return;
            if (e.key === "ArrowUp" && beaver.y > 0) beaver.y -= GRID_SIZE;
            if (e.key === "ArrowDown" && beaver.y < AREA_HEIGHT - beaver.height) beaver.y += GRID_SIZE;
            if (e.key === "ArrowLeft" && beaver.x > 0) beaver.x -= GRID_SIZE;
            if (e.key === "ArrowRight" && beaver.x < AREA_WIDTH - beaver.width) beaver.x += GRID_SIZE;
            updateBeaverPosition();
        });

        function updateBeaverPosition() {
            beaverDiv.style.left = beaver.x + "px";
            beaverDiv.style.top = beaver.y + "px";
        }

        init();
    </script>
</body>
</html>
