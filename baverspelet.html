<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bäver-Masen: Log-istic Disruption™</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5; /* Klassisk tech-grå */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: #003087; margin-bottom: 5px; }
        .subtitle { color: #666; font-style: italic; margin-top: 0; }

        #game-area {
            position: relative;
            width: 480px;
            height: 600px;
            background-color: #3498db; /* Vattnet i bäcken */
            border: 5px solid #0070ba; /* LagetPay-blå */
            border-radius: 15px;
            overflow: hidden; /* Döljer saker som flyter utanför */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* Spelobjekten */
        #beaver, .log, .obstacle {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #beaver {
            width: 50px; height: 50px;
            background-image: url('beaver-removebg-preview.png');
            z-index: 10;
        }

        .log {
            width: 80px; height: 30px;
            background-image: url('trästock-removebg-preview.png');
        }

        .obstacle {
            width: 60px; height: 60px;
            background-image: url('skvader-removebg-preview.png');
        }

        /* UI och Statistik */
        .stats {
            display: flex;
            justify-content: space-around;
            width: 480px;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            background-color: #0070ba;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #00568c; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Log-istic Disruption™</h1>
        <p class="subtitle">Disrupta marknaden med Bäver-Masen (Version 1.0-örtug)</p>
        
        <div id="game-area">
            <div id="beaver"></div>
            </div>

        <div class="stats">
            <div class="stat-box">Marknadsvärde: <span id="score">0:-</span></div>
            <div class="stat-box">Status: <span id="rank">Praktikant</span></div>
        </div>

        <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
            Styr med piltangenterna. Undvik skvadrarna – de gillar inte tillväxt!
        </p>
    </div>

    <script>
        // --- INSTÄLLNINGAR OCH VARIABLER ---
        const gameArea = document.getElementById("game-area");
        const beaverDiv = document.getElementById("beaver");
        const scoreBoard = document.getElementById("score");
        const rankDisplay = document.getElementById("rank");

        const masenSound = new Audio('masen.mp3');

        // Spelytans storlek
        const AREA_WIDTH = 480;
        const AREA_HEIGHT = 600;
        const GRID_SIZE = 40; // Hur långt bävern flyttar sig

        // Bäverns startläge
        let beaver = { x: AREA_WIDTH / 2 - 25, y: AREA_HEIGHT - 60, width: 50, height: 50 };
        
        let score = 0;
        let gameActive = false;
        let objectsInterval; // Timer för att skapa stockar och hinder

        // Listor för att hålla reda på alla stockar och hinder på skärmen
        let logs = [];
        let obstacles = [];

        // --- HUVUDFUNKTIONER ---

        function init() {
            gameActive = true;
            score = 0;
            scoreBoard.innerText = "0:-";
            rankDisplay.innerText = "Praktikant";
            beaver.x = AREA_WIDTH / 2 - 25;
            beaver.y = AREA_HEIGHT - 60;
            updateBeaverPosition();

            // Rensa gamla objekt
            logs.forEach(log => log.element.remove());
            obstacles.forEach(ob => ob.element.remove());
            logs = [];
            obstacles = [];

            // Starta loopen för att generera objekt
            clearInterval(objectsInterval);
            objectsInterval = setInterval(generateObjects, 1500); // Nytt objekt var 1.5 sekund

            requestAnimationFrame(gameLoop);
        }

        // --- SPEL-LOOP (Körs 60 gånger i sekunden) ---
        function gameLoop() {
            if (!gameActive) return;

            // 1. Flytta stockar
            logs.forEach(log => {
                log.y += 3; // Hastighet nedåt
                log.element.style.top = log.y + "px";
            });

            // 2. Flytta hinder (Skvadrar)
            obstacles.forEach(ob => {
                ob.y += 4; // Lite snabbare än stockarna
                ob.element.style.top = ob.y + "px";
            });

            // 3. Kolla krockar och poäng
            checkCollisions();

            // 4. Rensa objekt som flytit utanför
            logs = logs.filter(log => {
                if (log.y > AREA_HEIGHT) {
                    log.element.remove();
                    return false;
                }
                return true;
            });
            obstacles = obstacles.filter(ob => {
                if (ob.y > AREA_HEIGHT) {
                    ob.element.remove();
                    return false;
                }
                return true;
            });

            requestAnimationFrame(gameLoop);
        }

        // --- OBJEKTGENERERING ---
        function generateObjects() {
            // Skapa en stock
            createObject(true); // isLog = true

            // Skapa ett hinder (50% chans per gång)
            if (Math.random() < 0.5) {
                createObject(false); // isLog = false (Obstacle)
            }
        }

        function createObject(isLog) {
            const newElement = document.createElement("div");
            newElement.className = isLog ? "log" : "obstacle";
            
            // Slumpmässig startposition horisontellt
            const randomX = Math.random() * (AREA_WIDTH - 80); // Dra av bredden på objektet
            newElement.style.left = randomX + "px";
            newElement.style.top = "-70px"; // Starta precis ovanför skärmen
            
            gameArea.appendChild(newElement);

            if (isLog) {
                logs.push({ element: newElement, x: randomX, y: -70, width: 80, height: 30 });
            } else {
                obstacles.push({ element: newElement, x: randomX, y: -70, width: 60, height: 60 });
            }
        }

        // --- INTERAKTION OCH KROCKAR ---
        function checkCollisions() {
            // 1. Kolla stockar (Poäng)
            logs.forEach((log, index) => {
                if (isColliding(beaver, log)) {
                    score += 50;
                    scoreBoard.innerText = score + ":-";
                    log.element.remove();
                    logs.splice(index, 1);
                    masenSound.play(); // Spela Masen-ljudet vid poäng
                    updateRank();
                }
            });

            // 2. Kolla hinder (Game Over)
            obstacles.forEach(ob => {
                if (isColliding(beaver, ob)) {
                    gameOver("OBS! Krock med skvader. Administrationsavgift: 100% av dina örtugar.");
                }
            });
        }

        // Standard-funktion för att kolla om två fyrkanter överlappar
        function isColliding(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function updateRank() {
            if (score >= 500) rankDisplay.innerText = "Junior Log-istic Analyst";
            if (score >= 1000) rankDisplay.innerText = "Senior Value Creator";
            if (score >= 2000) rankDisplay.innerText = "Mythical Overlord of Disruption";
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(objectsInterval);
            alert("MARKNAVÄRDET KOLLAPSADE!\n\n" + msg + "\n\nDin slutliga donation: " + score + ":-");
            // Starta om
            init();
        }

        // --- BÄVERNTS KONTROLLER ---
        window.addEventListener("keydown", (e) => {
            if (!gameActive) return;

            if (e.key === "ArrowUp" && beaver.y > 0) beaver.y -= GRID_SIZE;
            if (e.key === "ArrowDown" && beaver.y < AREA_HEIGHT - beaver.height) beaver.y += GRID_SIZE;
            if (e.key === "ArrowLeft" && beaver.x > 0) beaver.x -= GRID_SIZE;
            if (e.key === "ArrowRight" && beaver.x < AREA_WIDTH - beaver.width) beaver.x += GRID_SIZE;

            updateBeaverPosition();
        });

        function updateBeaverPosition() {
            beaverDiv.style.left = beaver.x + "px";
            beaverDiv.style.top = beaver.y + "px";
        }

        // Starta spelet vid laddning
        init();

    </script>
</body>
</html>
