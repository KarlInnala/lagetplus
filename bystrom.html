<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bröderna Byströms Begravningsbyrå - Skuleskogen</title>
    <style>
        body { background: #1a1a1a; color: #ddd; text-align: center; font-family: 'Verdana', sans-serif; overflow: hidden; margin: 0; padding: 0; touch-action: manipulation; }
        canvas { border: 5px solid #444; background: #333; box-shadow: 0 0 25px rgba(0,0,0,0.7); max-width: 100%; height: auto; }
        h1 { margin-top: 10px; margin-bottom: 5px; color: #f0f0f0; letter-spacing: 2px; font-size: 1.5em; }
        .controls-info { color: #888; font-size: 0.8em; margin-bottom: 5px; }
        
        /* Mobilknappar */
        .mobile-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
        }
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.5); }

        #gameOverOverlay, #startOverlay { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); 
            padding: 40px; border: 3px solid #4CAF50; color: white; border-radius: 15px;
            z-index: 30;
        }
        #gameOverOverlay { display: none; border-color: red; }
        
        button.action-btn { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 5px; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>
    <h1>BRÖDERNA BYSTRÖM</h1>
    <div class="controls-info">Piltangenter eller touch-knappar till höger</div>
    
    <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="mobile-controls">
            <div class="touch-btn" id="btnUp">▲</div>
            <div class="touch-btn" id="btnDown">▼</div>
        </div>

        <div id="startOverlay">
            <h2>REDO FÖR E4:an?</h2>
            <p>"I vårat yrke är det riskfritt att köre full!"</p>
            <button class="action-btn" onclick="startGame()">STARTA SPELET</button>
        </div>

        <div id="gameOverOverlay">
            <h2 id="deathTitle" style="color: red;">DIKET NÄSTA!</h2>
            <p id="deathMessage">"Det var visst in't helt riskfritt att köre full..."</p>
            <button class="action-btn" onclick="resetGame()">Försök igen</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('gameOverOverlay');
const startOverlay = document.getElementById('startOverlay');
const deathTitle = document.getElementById('deathTitle');

let car = { x: 100, y: 180, w: 110, h: 45, speed: 4 };
let roadOffset = 0;
let drunkFactor = 0;
let police = { x: 2000, y: 150, w: 85, h: 45, speed: 6 }; 
let isGameOver = false;
let isGameStarted = false;

// Miljödekorationer (Minskat antal för mindre plottrighet)
let decorations = [];
let signs = [];

function createDecor() {
    decorations = [];
    for(let i = 0; i < 10; i++) { // Minskat från 20 till 10
        decorations.push({
            x: Math.random() * 800,
            y: Math.random() < 0.5 ? Math.random() * 35 : 365 + Math.random() * 30,
            type: Math.random() < 0.6 ? 'flower' : 'marker',
            color: Math.random() < 0.5 ? '#FFD700' : '#DA70D6'
        });
    }
    // Skapa en initial skylt
    signs.push({ x: 1200, label: "SUNDSVALL", dir: "left" });
}
createDecor();

let currentQuote = "";
let quoteTimer = 0;

const citat = [
    "I vårat yrke är det riskfritt att köra full!",
    "Tror du polisen stoppar en likbil på ljusan dan?",
    "Jag går mot döden vart jag än går!",
    "Solen skiner, allt är ganska rart!",
    "Nä tro mig Halvard, i vårat yrke är detta riskfritt!",
    "Nu är vi snart i Skuleskogen..."
];

function startGame() {
    isGameStarted = true;
    startOverlay.style.display = "none";
    requestAnimationFrame(draw);
}

function resetGame() {
    car.y = 180;
    police.x = 2000;
    drunkFactor = 0;
    roadOffset = 0;
    isGameOver = false;
    overlay.style.display = "none";
    signs = [{ x: 1200, label: "SUNDSVALL", dir: "left" }];
    requestAnimationFrame(draw);
}

function moveUp() { if(isGameStarted && !isGameOver) car.y -= 25; }
function moveDown() { if(isGameStarted && !isGameOver) car.y += 25; }

document.getElementById('btnUp').addEventListener('touchstart', (e) => { e.preventDefault(); moveUp(); });
document.getElementById('btnDown').addEventListener('touchstart', (e) => { e.preventDefault(); moveDown(); });
document.getElementById('btnUp').addEventListener('mousedown', moveUp);
document.getElementById('btnDown').addEventListener('mousedown', moveDown);

function draw() {
    if (!isGameStarted || isGameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#1e3d1e"; 
    ctx.fillRect(0, 0, 800, 400);
    
    // Rita blommor och markeringar i diket
    decorations.forEach(d => {
        d.x -= car.speed;
        if(d.x < -20) { d.x = 820; d.y = Math.random() < 0.5 ? Math.random() * 35 : 365 + Math.random() * 30; }
        
        if(d.type === 'flower') {
            ctx.fillStyle = d.color;
            ctx.beginPath();
            ctx.arc(d.x, d.y, 3, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillStyle = "white";
            ctx.fillRect(d.x, d.y - 10, 4, 15);
            ctx.fillStyle = "black";
            ctx.fillRect(d.x, d.y - 5, 4, 3);
        }
    });

    // Rita vägskyltar (Svensk modell: Blå med vit kant)
    signs.forEach((s, index) => {
        s.x -= car.speed;
        
        // Rita stolpe
        ctx.fillStyle = "#888";
        ctx.fillRect(s.x + 40, 15, 4, 40);
        
        // Rita skylt-tavla
        ctx.fillStyle = "white"; // Kant
        ctx.fillRect(s.x, 15, 85, 25);
        ctx.fillStyle = "#0055aa"; // Blå färg
        ctx.fillRect(s.x + 2, 17, 81, 21);
        
        // Text på skylt
        ctx.fillStyle = "white";
        ctx.font = "bold 10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(s.label, s.x + 42, 31);
        
        // Pil
        ctx.beginPath();
        if(s.dir === "left") {
            ctx.moveTo(s.x + 5, 27); ctx.lineTo(s.x + 12, 22); ctx.lineTo(s.x + 12, 32);
        } else {
            ctx.moveTo(s.x + 80, 27); ctx.lineTo(s.x + 73, 22); ctx.lineTo(s.x + 73, 32);
        }
        ctx.fill();
        ctx.textAlign = "start"; // Reset alignment

        if(s.x < -100) {
            s.x = 1500 + Math.random() * 500;
            s.label = Math.random() > 0.5 ? "SUNDSVALL" : "Ö-VIK";
            s.dir = s.label === "SUNDSVALL" ? "left" : "right";
        }
    });

    ctx.fillStyle = "#333"; 
    ctx.fillRect(0, 50, 800, 300);

    ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = roadOffset; 
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 200);
    ctx.lineTo(800, 200);
    ctx.stroke();
    roadOffset += car.speed;

    drunkFactor += (Math.random() - 0.5) * 0.45;
    drunkFactor *= 0.97; 
    car.y += drunkFactor;

    if(car.y < 50 || car.y > 350 - car.h) { 
        isGameOver = true;
        deathTitle.innerText = "UT FÖR EN BRANT!";
        overlay.style.display = "block";
    }

    if (police.x > 1990) police.y = 60 + Math.random() * 230;

    ctx.fillStyle = "#003399";
    ctx.fillRect(police.x, police.y, police.w, police.h);
    ctx.fillStyle = "white";
    ctx.font = "bold 12px sans-serif";
    ctx.fillText("POLIS", police.x + 10, police.y + 25);
    
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(police.x + 5, police.y + 5, 10, 8);
    ctx.fillRect(police.x + 5, police.y + 32, 10, 8);

    if(Math.floor(Date.now() / 200) % 2 == 0) {
        ctx.fillStyle = "red";
        ctx.fillRect(police.x + police.w - 15, police.y - 3, 15, 5);
    }

    police.x -= police.speed;

    if (car.x < police.x + police.w &&
        car.x + car.w > police.x &&
        car.y < police.y + police.h &&
        car.y + car.h > police.y) {
        isGameOver = true;
        deathTitle.innerText = "PANG! FRONTALKROCK!";
        overlay.style.display = "block";
    }

    if (police.x < car.x + 500 && police.x > car.x + 300 && quoteTimer <= 0) {
        currentQuote = citat[Math.floor(Math.random() * citat.length)];
        quoteTimer = 180; 
    }

    if(police.x < -150) police.x = 2200;

    if (quoteTimer > 0) {
        ctx.font = "14px 'Comic Sans MS', cursive";
        let textWidth = ctx.measureText(currentQuote).width;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.roundRect(car.x, car.y - 65, textWidth + 20, 35, 12);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.fillText(currentQuote, car.x + 10, car.y - 42);
        quoteTimer--;
    }

    ctx.fillStyle = "black";
    ctx.fillRect(car.x, car.y, car.w, car.h);
    ctx.fillStyle = "#333";
    ctx.fillRect(car.x + 10, car.y + 5, 60, 35); 
    ctx.fillStyle = "#add8e6";
    ctx.fillRect(car.x + 80, car.y + 5, 25, 35); 
    ctx.fillStyle = "silver";
    ctx.fillRect(car.x, car.y + car.h - 5, car.w, 5); 

    ctx.fillStyle = "white";
    ctx.fillRect(car.x + 15, car.y + 19, 37, 7); 
    ctx.fillRect(car.x + 35, car.y + 8, 7, 30);

    ctx.fillStyle = "#ffd700";
    ctx.fillRect(car.x + car.w - 5, car.y + 5, 5, 12);
    ctx.fillRect(car.x + car.w - 5, car.y + 28, 5, 12);

    requestAnimationFrame(draw);
}

window.addEventListener('keydown', (e) => {
    if(!isGameStarted || isGameOver) return;
    if(e.key === "ArrowUp") moveUp(); 
    if(e.key === "ArrowDown") moveDown();
});
</script>
</body>
</html>
