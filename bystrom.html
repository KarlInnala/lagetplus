<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Bröderna Byströms Begravningsbyrå - E4:an norr mot ö-vik</title>
    <style>
        body { background: #1a1a1a; color: #ddd; text-align: center; font-family: 'Verdana', sans-serif; overflow: hidden; }
        canvas { border: 5px solid #444; background: #333; box-shadow: 0 0 25px rgba(0,0,0,0.7); }
        h1 { margin-bottom: 5px; color: #f0f0f0; letter-spacing: 2px; }
        .controls { color: #888; font-size: 0.9em; margin-bottom: 15px; }
        .status-bar { margin-top: 10px; font-style: italic; color: #4CAF50; }
        #gameOverOverlay { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); 
            padding: 40px; border: 3px solid red; color: white; border-radius: 15px;
        }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; background: #4CAF50; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>⚰️ BRÖDERNA BYSTRÖM BEGRAVNINGSBYRÅ</h1>
    <div class="controls">Håll Enar på vägen med PILTANGENTERNA (Upp & Ner)</div>
    
    <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="gameOverOverlay">
            <h2 style="color: red;">POLISEN STOPPADE ER!</h2>
            <p id="deathMessage">"Det var visst in't helt riskfritt att köre full..."</p>
            <button onclick="resetGame()">Försök igen</button>
        </div>
    </div>
    
    <div class="status-bar" id="status">Status: På väg norrut mot Örnsköldsvik...</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('gameOverOverlay');

let car = { x: 100, y: 180, w: 85, h: 35, speed: 3.5 };
let roadOffset = 0;
let drunkFactor = 0;
let police = { x: 1500, y: 115, w: 65, h: 35 }; 
let isGameOver = false;

let currentQuote = "";
let quoteTimer = 0;

const citat = [
    "I vårat yrke är det riskfritt att köra full!",
    "Tror du polisen stoppar en likbil på ljusan dan?",
    "Jag går mot döden vart jag än går!",
    "Solen skiner, allt är ganska rart!",
    "Det är riskfritt att köre full!",
    "Nu är vi snart i Skuleskogen..."
];

function resetGame() {
    car.y = 180;
    police.x = 1500;
    drunkFactor = 0;
    isGameOver = false;
    overlay.style.display = "none";
    draw();
}

function draw() {
    if (isGameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Vägen
    ctx.fillStyle = "#333";
    ctx.fillRect(0, 100, 800, 200);
    ctx.fillStyle = "#1e3d1e";
    ctx.fillRect(0, 0, 800, 100);
    ctx.fillRect(0, 300, 800, 100);

    ctx.strokeStyle = "rgba(255, 255, 255, 0.7)";
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = -roadOffset;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 200);
    ctx.lineTo(800, 200);
    ctx.stroke();
    roadOffset += car.speed;

    // 2. ÖKAD DRUNKEN SWAY
    // Ökade från 0.12 till 0.35 för mer "buskis"-vingel
    drunkFactor += (Math.random() - 0.5) * 0.35; 
    drunkFactor *= 0.97; 
    car.y += drunkFactor;

    if(car.y < 105) { car.y = 105; drunkFactor *= -0.5; }
    if(car.y > 260) { car.y = 260; drunkFactor *= -0.5; }

    // 3. Polisen
    // Vi slumpar polisens Y-position varje gång den kommer in för att göra det svårare
    if (police.x > 1490) police.y = 105 + Math.random() * 160;

    ctx.fillStyle = "#003399";
    ctx.fillRect(police.x, police.y, police.w, police.h);
    ctx.fillStyle = "white";
    ctx.font = "bold 11px sans-serif";
    ctx.fillText("POLIS", police.x + 14, police.y + 22);
    
    if(Math.floor(Date.now() / 200) % 2 == 0) {
        ctx.fillStyle = "red";
        ctx.fillRect(police.x + 40, police.y - 3, 15, 5);
    }

    police.x -= car.speed;

    // KROCK-KOLLISION (Game Over logik)
    if (car.x < police.x + police.w &&
        car.x + car.w > police.x &&
        car.y < police.y + police.h &&
        car.y + car.h > police.y) {
        isGameOver = true;
        overlay.style.display = "block";
    }

    // Pratbubbla
    if (police.x < car.x + 250 && police.x > car.x + 100 && quoteTimer <= 0) {
        currentQuote = citat[Math.floor(Math.random() * citat.length)];
        quoteTimer = 150; 
    }

    if(police.x < -150) police.x = 1800;

    // 4. Pratbubblan
    if (quoteTimer > 0) {
        ctx.font = "14px 'Comic Sans MS', cursive";
        let textWidth = ctx.measureText(currentQuote).width;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.roundRect(car.x - 10, car.y - 55, textWidth + 20, 35, 12);
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.fillText(currentQuote, car.x, car.y - 32);
        quoteTimer--;
    }

    // 5. Bilen
    ctx.fillStyle = "black";
    ctx.fillRect(car.x, car.y, car.w, car.h);
    ctx.fillStyle = "#333";
    ctx.fillRect(car.x + 5, car.y + 5, 45, 25);
    ctx.fillStyle = "#add8e6";
    ctx.fillRect(car.x + 60, car.y + 5, 18, 25);
    ctx.fillStyle = "silver";
    ctx.fillRect(car.x, car.y + 32, car.w, 3);
    ctx.fillStyle = "#ffd700";
    ctx.fillRect(car.x + car.w - 5, car.y + 5, 5, 8);
    ctx.fillRect(car.x + car.w - 5, car.y + 22, 5, 8);

    requestAnimationFrame(draw);
}

window.addEventListener('keydown', (e) => {
    if(isGameOver) return;
    if(e.key === "ArrowUp") car.y -= 15;
    if(e.key === "ArrowDown") car.y += 15;
});

draw();
</script>
</body>
</html>
