<title>Whack-a-Mas | LagetPay™</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5; /* Klassisk tech-grå */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: #003087; margin-bottom: 5px; }
        .subtitle { color: #666; font-style: italic; margin-top: 0; margin-bottom: 20px; }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #0070ba; /* LagetPay-blå */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .stat-box {
            background: #e6f0ff;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }

        /* Spelplanen - 3x3 rutnät */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            grid-gap: 15px;
            justify-content: center;
        }

        .hole {
            background-color: #b3d9ff; /* "Hålet" där myntet dyker upp */
            border-radius: 50%;
            position: relative;
            overflow: hidden; /* Döljer myntet när det är "nere" */
            cursor: pointer;
            border: 2px solid #80bdff;
            transition: background-color 0.2s;
        }
        .hole:hover { background-color: #cce0ff; }

        /* Själva örtugen/myntet */
        .coin {
    width: 100%;
    height: 100%;
    background-image: url('tf.png'); /* <-- ANVÄND DIN LOGGA HÄR */
    
    /* --- NYTT: De här raderna centrerar bilden och får den att täcka hålet --- */
    background-size: cover;    /* NY: Bilden sträcks för att täcka hela hålet utan att bli ihoptryckt */
    background-position: center; /* NY: Bildens centrum placeras i hålets centrum */
    background-repeat: no-repeat; /* NY: Förhindrar att bilden upprepas om hålet är stort */
    /* ------------------------------------------------------------------------ */

    position: absolute;
    bottom: -100%; /* Startar gömd under hålet */
    transition: bottom 0.1s ease-out; /* Hastigheten myntet dyker upp */
    border-radius: 50%;
}

        /* Klassen som JavaScript lägger till för att visa myntet */
        .hole.up .coin {
            bottom: 0; /* Flyttar upp myntet */
        }

        button {
            margin-top: 25px;
            padding: 15px 35px;
            font-size: 1.2em;
            background-color: #0070ba;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: bold;
        }
        button:hover { background-color: #00568c; }
        button:active { transform: scale(0.97); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="game-container">
        <h1>Whack-a-Mas™</h1>
        <p class="subtitle">Ge donationer genom klicka på Masen!</p>

        <div class="stats">
            <div class="stat-box">Donationer: <span id="score">0:-</span></div>
            <div class="stat-box">Tid kvar: <span id="time">15</span>s</div>
        </div>

        <div class="grid">
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
        </div>

        <button id="start-btn" onclick="startGame()">Starta Investeringsrunda</button>
    </div>

    <script>
    const holes = document.querySelectorAll('.hole');
    const scoreBoard = document.getElementById('score');
    const timeDisplay = document.getElementById('time');
    const startBtn = document.getElementById('start-btn');
    
    // --- NYTT: Skapa ljudobjektet ---
    const masenSound = new Audio('masen.mp3'); 
    // -------------------------------

    let lastHole;
    let timeUp = false;
    let score = 0;
    let countdown;
    let timeLeft = 15;

    function randomTime(min, max) {
        return Math.round(Math.random() * (max - min) + min);
    }

    function randomHole(holesList) {
        const index = Math.floor(Math.random() * holesList.length);
        const hole = holesList[index];
        if (hole === lastHole) {
            return randomHole(holesList);
        }
        lastHole = hole;
        return hole;
    }

    function peep() {
        const time = randomTime(400, 1000);
        const hole = randomHole(holes);
        hole.classList.add('up');
        setTimeout(() => {
            hole.classList.remove('up');
            if (!timeUp) peep();
        }, time);
    }

    function startGame() {
        score = 0;
        scoreBoard.innerText = "0:-";
        timeUp = false;
        timeLeft = 15;
        timeDisplay.innerText = timeLeft;
        startBtn.disabled = true;
        startBtn.innerText = "Investerar...";

        countdown = setInterval(() => {
            timeLeft--;
            timeDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timeUp = true;
                startBtn.disabled = false;
                startBtn.innerText = "Starta Om (50:-)";
                
                setTimeout(() => {
                    alert("Rundan klar! Du lyckades donera " + score + ":- till Örtugens nya padel-hall. Bra jobbat!");
                }, 10);
            }
        }, 1000);

        peep();
    }

    function whack(e) {
        if(!e.isTrusted) return; 
        if (!this.classList.contains('up')) return;

        // --- NYTT: Spela ljudet vid träff ---
        masenSound.currentTime = 0; // Återställer ljudet till början (så man kan klicka snabbt)
        masenSound.play();
        // ------------------------------------

        score += 10;
        this.classList.remove('up');
        scoreBoard.innerText = score + ":-";
    }

    holes.forEach(hole => hole.addEventListener('click', whack));
</script>

</body>
</html>
