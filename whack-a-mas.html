<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mas</title>
    <link rel="stylesheet" href="menu.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { color: #003087; margin-bottom: 5px; }
        .subtitle { color: #666; font-style: italic; margin-top: 0; margin-bottom: 20px; }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #0070ba;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Countdown overlay */
        #pre-timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            font-weight: bold;
            color: #0070ba;
            z-index: 10;
            display: none;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .stat-box {
            background: #e6f0ff;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #cce0ff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            grid-gap: 15px;
            justify-content: center;
        }

        .hole {
            background-color: #b3d9ff;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid #80bdff;
            transition: background-color 0.2s;
        }
        .hole:hover { background-color: #cce0ff; }

        .coin {
            width: 100%;
            height: 100%;
            background-image: url('masen-removebg-preview.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            bottom: -100%;
            transition: bottom 0.1s ease-out;
            border-radius: 50%;
        }

        .hole.up .coin {
            bottom: 0;
        }

        /* Rotation för nedräkningen */
        .spin-left { animation: spinLeft 0.5s linear 2; }
        .spin-right { animation: spinRight 0.5s linear 2; }

        @keyframes spinLeft {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }
        @keyframes spinRight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        button {
            margin-top: 25px;
            padding: 15px 35px;
            font-size: 1.2em;
            background-color: #0070ba;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: bold;
        }
        button:hover { background-color: #00568c; }
        button:active { transform: scale(0.97); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="menu">
        <ul>
            <li><a href="homepage.html"><div>Hem</div></a></li>
            <li><a href="spel.html"><div>Spel</div></a></li>
            <li><a href="upgrade.html"><div>Upgradera</div></a></li>
            <li><a href="omvoila.html"><div>VOILA</div></a></li>
        </ul>
    </nav>

    <div class="game-container">
        <div id="pre-timer">3</div>
        <h1>Whack-a-Mas™</h1>
        <p class="subtitle">Whacka Masen genom att klicka på han när han dyker upp!!</p>

        <div class="stats">
            <div class="stat-box">Antal whackade masar: <span id="score">0</span></div>
            <div class="stat-box">Tid kvar: <span id="time">15</span>s</div>
        </div>

        <div class="grid">
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
            <div class="hole"><div class="coin"></div></div>
        </div>

        <button id="start-btn" onclick="startCountdown()">Starta runda</button>
    </div>

    <script>
    const holes = document.querySelectorAll('.hole');
    const coins = document.querySelectorAll('.coin');
    const scoreBoard = document.getElementById('score');
    const timeDisplay = document.getElementById('time');
    const startBtn = document.getElementById('start-btn');
    const preTimerDisplay = document.getElementById('pre-timer');

    let lastHole;
    let timeUp = false;
    let score = 0;
    let countdown;
    let timeLeft = 15;
    let isWhackable = false;

    function randomTime(min, max) {
        return Math.round(Math.random() * (max - min) + min);
    }

    function randomHole(holesList) {
        const index = Math.floor(Math.random() * holesList.length);
        const hole = holesList[index];
        if (hole.classList.contains('up')) {
            return randomHole(holesList);
        }
        return hole;
    }

    // NY LOGIK: Varje mas-peep är nu en oberoende händelse
    function peep() {
        if (timeUp) return;

        const hole = randomHole(holes);
        const stayTime = randomTime(600, 1000); // Hur länge de är uppe
        
        hole.classList.add('up');
        
        let clicked = false;
        const currentWhack = () => { clicked = true; };
        hole.addEventListener('click', currentWhack, { once: true });

        setTimeout(() => {
            hole.classList.remove('up');
            hole.removeEventListener('click', currentWhack);
            
            if (!clicked && !timeUp) {
                new Audio('masen_skratt.mp3').play();
            }

            // När en mas åker ner, väntar den en stund och dyker sen upp igen
            // Pausen blir kortare ju mindre tid som är kvar
            let minWait = timeLeft <= 5 ? 200 : (timeLeft <= 10 ? 500 : 800);
            let maxWait = timeLeft <= 5 ? 600 : (timeLeft <= 10 ? 1000 : 1500);
            
            if (!timeUp) setTimeout(peep, randomTime(minWait, maxWait));
        }, stayTime);
    }

    function startCountdown() {
        startBtn.disabled = true;
        isWhackable = false;
        score = 0;
        scoreBoard.innerText = "0";
        timeUp = false;
        timeLeft = 15;
        timeDisplay.innerText = timeLeft;
        
        holes.forEach(hole => hole.classList.add('up'));

        setTimeout(() => {
            new Audio('masen_skratt.mp3').play();
            
            coins.forEach(coin => {
                const direction = Math.random() > 0.5 ? 'spin-right' : 'spin-left';
                coin.classList.add(direction);
            });

            setTimeout(() => {
                holes.forEach(hole => hole.classList.remove('up'));
                coins.forEach(coin => {
                    coin.classList.remove('spin-left', 'spin-right');
                });
                
                runThreeTwoOne();
            }, 1000);
        }, 1000);
    }

    function runThreeTwoOne() {
        let count = 3;
        preTimerDisplay.style.display = "block";
        preTimerDisplay.innerText = count;

        const countInterval = setInterval(() => {
            count--;
            if (count > 0) {
                preTimerDisplay.innerText = count;
            } else {
                clearInterval(countInterval);
                preTimerDisplay.style.display = "none";
                isWhackable = true;
                startGame();
            }
        }, 1000);
    }

    function startGame() {
        startBtn.innerText = "Startar...";
        countdown = setInterval(() => {
            timeLeft--;
            timeDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timeUp = true;
                startBtn.disabled = false;
                startBtn.innerText = "Starta Om";
                setTimeout(() => {
                    alert("Rundan klar! Du lyckades whacka " + score + " stycken masar. Bra jobbat!");
                }, 100);
            }
        }, 1000);

        // Starta 3 oberoende loopar direkt för att få fart på spelet
        peep();
        setTimeout(peep, 300);
        setTimeout(peep, 600);
    }

    function whack(e) {
        if(!e.isTrusted) return; 
        if (!isWhackable || !this.classList.contains('up')) return;

        new Audio('masen.mp3').play();
        score += 1;
        this.classList.remove('up');
        scoreBoard.innerText = score;
    }

    holes.forEach(hole => hole.addEventListener('click', whack));
    </script>

</body>
</html>
