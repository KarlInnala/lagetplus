<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masen vs Skvadern - Pro Edition</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #game-container { position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { border: 4px solid #444; background: #000; display: block; }

        /* UI och Healthbars */
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 5; display: none; }
        .health-container { width: 300px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; overflow: hidden; position: relative; }
        .health-bar { height: 100%; width: 100%; transition: width 0.2s, background-color 0.3s; background-color: #00ff00; }
        .name-label { position: absolute; top: -20px; font-weight: bold; text-shadow: 2px 2px 4px #000; text-transform: uppercase; }

        /* Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        
        /* Karaktärsväljare */
        .selection-area { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .selection-box { background: #333; padding: 15px; border: 3px solid #555; border-radius: 15px; text-align: center; width: 200px; }
        .selection-box.p1 { border-color: #0070ba; }
        .selection-box.p2 { border-color: #ff4444; }
        .preview-img { width: 80px; height: 80px; background: #444; border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #555; }
        .preview-img img { width: 80%; height: auto; }
        
        /* Arena & Garderob */
        .sub-selection { background: #222; padding: 10px; border: 1px solid #444; border-radius: 8px; margin-top: 10px; }
        .kit-btn { background: #444; border: 1px solid #666; color: white; padding: 4px 10px; cursor: pointer; border-radius: 4px; font-size: 11px; margin-top: 5px; width: 100%; }
        .kit-btn:hover { background: #555; }

        .stats-container { text-align: left; margin-top: 10px; font-size: 11px; color: #bbb; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .stat-bar-bg { width: 80px; height: 6px; background: #111; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .stat-bar-fill { height: 100%; background: #ffd700; }

        .nav-btn { background: #555; border: none; color: white; padding: 5px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .nav-btn:hover { background: #777; }

        button.action-btn { padding: 12px 40px; font-size: 18px; font-weight: bold; color: white; background: #0070ba; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button.action-btn:hover { background: #008cff; transform: scale(1.05); }

        #gameOverOverlay { display: none; }
        .controls-hint { color: #888; margin-top: 15px; font-size: 14px; text-align: center;}
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div style="position: relative;">
            <div id="p1Name" class="name-label" style="left: 0;">SPELARE 1</div>
            <div class="health-container"><div id="p1Bar" class="health-bar"></div></div>
        </div>
        <div style="position: relative;">
            <div id="p2Name" class="name-label" style="right: 0;">MOTSTÅNDARE</div>
            <div class="health-container"><div id="p2Bar" class="health-bar"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="startOverlay" class="overlay">
        <h2 style="margin-bottom: 20px; letter-spacing: 2px;">VÄLJ KARAKTÄR & GARDEROB</h2>
        
        <div class="selection-area">
            <div class="selection-box p1">
                <div class="preview-img"><img id="p1Preview" src="" alt=""></div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="nav-btn" onclick="changeChar('p1', -1)">&lt;</button>
                    <b id="p1CharName" style="font-size: 13px;">NAMN</b>
                    <button class="nav-btn" onclick="changeChar('p1', 1)">&gt;</button>
                </div>
                <div class="sub-selection">
                    <div style="font-size: 10px;">STÄLL</div>
                    <button id="p1KitBtn" class="kit-btn" onclick="toggleKit('p1')">HEMMA</button>
                </div>
                <div id="p1Stats" class="stats-container"></div>
            </div>

            <div class="selection-box p2">
                <div class="preview-img"><img id="p2Preview" src="" alt=""></div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button class="nav-btn" onclick="changeChar('p2', -1)">&lt;</button>
                    <b id="p2CharName" style="font-size: 13px;">NAMN</b>
                    <button class="nav-btn" onclick="changeChar('p2', 1)">&gt;</button>
                </div>
                <div class="sub-selection">
                    <div style="font-size: 10px;">STÄLL</div>
                    <button id="p2KitBtn" class="kit-btn" onclick="toggleKit('p2')">HEMMA</button>
                </div>
                <div id="p2Stats" class="stats-container"></div>
            </div>
        </div>

        <div class="arena-box" style="background:#222; padding:15px; border-radius:10px; width:430px; text-align:center; margin-bottom:20px;">
            <h4 style="margin:0 0 10px 0">ARENA</h4>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="nav-btn" onclick="changeArena(-1)">&lt;</button>
                <b id="arenaName" style="font-size: 16px; color: #ffd700;">BUNKERN</b>
                <button class="nav-btn" onclick="changeArena(1)">&gt;</button>
            </div>
        </div>

        <button class="action-btn" onclick="initGame()">FIGHT!</button>
        <div class="controls-hint">Piltangenter: Gå/Hoppa | A: Sparka | S: Boxas</div>
    </div>

    <div id="gameOverOverlay" class="overlay">
        <h1 id="winMessage" style="font-size: 40px; margin-bottom: 30px;"></h1>
        <div style="display:flex; gap:20px;">
            <button class="action-btn" onclick="initGame()">REVANSCH</button>
            <button class="action-btn" style="background:#555;" onclick="backToMenu()">MENY</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const fighters = [
    { 
        name: "Masen", file: "masen-removebg-preview.png", styrka: 5, snabbhet: 2, smidighet: 3,
        kits: { 
            home: { shirt: "#0070ba", pants: "#222" }, 
            away: { shirt: "#fff", pants: "#0070ba" } 
        }
    },
    { 
        name: "Skvadern", file: "skvader-removebg-preview.png", styrka: 2, snabbhet: 5, smidighet: 3,
        kits: { 
            home: { shirt: "#ff4444", pants: "#333" }, 
            away: { shirt: "#ffd700", pants: "#ff4444" } 
        }
    },
    { 
        name: "Rune", file: "rune.png.webp", styrka: 3, snabbhet: 3, smidighet: 4,
        kits: { 
            home: { shirt: "#2e7d32", pants: "#3e2723" }, 
            away: { shirt: "#f5f5dc", pants: "#2e7d32" } 
        }
    }
];

const arenas = [
    { name: "Bunkern", file: null },
    { name: "Gamla salen", file: "gamlasalen.jpg" },
    { name: "Höga kustenbron", file: "hogakusten.jpg" },
    { name: "Hägglunds Arena", file: "hagglunds.jpg" }
];

let p1Idx = 0, p2Idx = 1, arenaIdx = 0;
let p1Kit = 'home', p2Kit = 'home';

fighters.forEach(f => { f.img = new Image(); f.img.src = f.file; });
arenas.forEach(a => { if(a.file) { a.img = new Image(); a.img.src = a.file; } });

const soundSlag = new Audio('slag.mp3');
const soundBell = new Audio('boxingbell.mp3');

let gameActive = false;
const gravity = 0.8;
const groundY = canvas.height - 30;
const keysPressed = {};
let player, enemy;
const keys = { left: false, right: false, up: false, a: false, s: false };

function toggleKit(p) {
    if(p === 'p1') p1Kit = p1Kit === 'home' ? 'away' : 'home';
    else p2Kit = p2Kit === 'home' ? 'away' : 'home';
    updateMenu();
}

function renderStats(targetId, fighter) {
    const stats = [{ label: "Styrka", val: fighter.styrka }, { label: "Snabbhet", val: fighter.snabbhet }, { label: "Smidighet", val: fighter.smidighet }];
    let html = '';
    stats.forEach(s => { html += `<div class="stat-row"><span>${s.label}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width: ${s.val * 20}%"></div></div></div>`; });
    document.getElementById(targetId).innerHTML = html;
}

function updateMenu() {
    document.getElementById('p1Preview').src = fighters[p1Idx].file;
    document.getElementById('p1CharName').innerText = fighters[p1Idx].name;
    document.getElementById('p1KitBtn').innerText = p1Kit.toUpperCase();
    renderStats('p1Stats', fighters[p1Idx]);

    document.getElementById('p2Preview').src = fighters[p2Idx].file;
    document.getElementById('p2CharName').innerText = fighters[p2Idx].name;
    document.getElementById('p2KitBtn').innerText = p2Kit.toUpperCase();
    renderStats('p2Stats', fighters[p2Idx]);

    document.getElementById('arenaName').innerText = arenas[arenaIdx].name.toUpperCase();
}

function changeChar(playerType, dir) {
    if(playerType === 'p1') p1Idx = (p1Idx + dir + fighters.length) % fighters.length;
    else p2Idx = (p2Idx + dir + fighters.length) % fighters.length;
    updateMenu();
}

function changeArena(dir) {
    arenaIdx = (arenaIdx + dir + arenas.length) % arenas.length;
    updateMenu();
}

// Input handling, initGame, backToMenu, checkCollision, updateBars (samma som förut)
window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === 'ArrowUp') keys.up = true;
    if (key === 'a' && !keysPressed['a']) { keys.a = true; keysPressed['a'] = true; }
    if (key === 's' && !keysPressed['s']) { keys.s = true; keysPressed['s'] = true; }
});
window.addEventListener('keyup', e => {
    const key = e.key.toLowerCase();
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
    if (e.key === 'ArrowUp') keys.up = false;
    if (key === 'a') { keys.a = false; keysPressed['a'] = false; }
    if (key === 's') { keys.s = false; keysPressed['s'] = false; }
});

function initGame() {
    player = createCharacter(150, fighters[p1Idx], p1Kit, true);
    enemy = createCharacter(600, fighters[p2Idx], p2Kit, false);
    document.getElementById('p1Name').innerText = player.name;
    document.getElementById('p2Name').innerText = enemy.name;
    updateBars();
    gameActive = true;
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('ui').style.display = 'flex';
}

function createCharacter(x, data, kitType, isPlayer) {
    return {
        x: x, y: 0, velX: 0, velY: 0, width: 40, height: 110, health: 100, onGround: false, facingRight: isPlayer,
        isKicking: false, isPunching: false, attackTimer: 0, hasHit: false, name: data.name, face: data.img,
        isPlayer: isPlayer, walkFrame: 0, knockedOut: false, styrka: data.styrka, snabbhet: data.snabbhet, smidighet: data.smidighet,
        kit: data.kits[kitType]
    };
}

function backToMenu() {
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('startOverlay').style.display = 'flex';
    document.getElementById('ui').style.display = 'none';
    gameActive = false;
}

function checkCollision(attacker, defender, range) {
    if (attacker.hasHit || defender.knockedOut) return;
    const dist = Math.abs((attacker.x + attacker.width/2) - (defender.x + defender.width/2));
    if (dist < range && Math.abs(attacker.y - defender.y) < 60) {
        defender.health -= (attacker.isKicking ? 3.5 : 2) * attacker.styrka;
        soundSlag.currentTime = 0; soundSlag.play();
        const kForce = attacker.isKicking ? 15 + attacker.styrka : 10 + attacker.styrka;
        defender.velX = attacker.facingRight ? kForce : -kForce;
        attacker.hasHit = true; updateBars();
    }
}

function updateBars() {
    if (!player || !enemy) return;
    document.getElementById('p1Bar').style.width = Math.max(0, player.health) + "%";
    document.getElementById('p2Bar').style.width = Math.max(0, enemy.health) + "%";
}

function updateChar(char, target = null) {
    if (char.knockedOut) {
        char.velX *= 0.9; char.x += char.velX;
        if (char.y + char.height > groundY) { char.y = groundY - char.height; char.velY = 0; }
        else { char.velY += gravity; char.y += char.velY; }
        return;
    }
    if (!gameActive) return;
    const mSpd = 3.5 + (char.snabbhet * 1.1);
    const jPwr = 12 + (char.snabbhet * 0.8);
    if (!char.isPlayer && target) {
        const d = char.x - target.x;
        if (Math.abs(d) > 60) { char.velX = d > 0 ? -mSpd : mSpd; char.facingRight = d < 0; }
        else {
            char.velX *= 0.5;
            if (char.attackTimer === 0) {
                if (Math.random() < 0.03 + (char.smidighet * 0.015)) { 
                    if(Math.random() > 0.8) char.isKicking = true; else char.isPunching = true;
                    char.attackTimer = Math.max(8, 25 - char.smidighet*4); char.hasHit = false; 
                }
            }
        }
    } else if (char.isPlayer) {
        char.velX *= 0.8;
        if (keys.left) { char.velX = -mSpd; char.facingRight = false; }
        if (keys.right) { char.velX = mSpd; char.facingRight = true; }
        if (keys.up && char.onGround) { char.velY = -jPwr; char.onGround = false; }
        if (char.attackTimer === 0) {
            if (keys.a) { char.isKicking = true; char.attackTimer = Math.max(12, 38 - char.smidighet*5); char.hasHit = false; keys.a = false; }
            else if (keys.s) { char.isPunching = true; char.attackTimer = Math.max(6, 26 - char.smidighet*4); char.hasHit = false; keys.s = false; }
        }
    }
    char.velY += gravity; char.x += char.velX; char.y += char.velY;
    if (char.y + char.height > groundY) { char.y = groundY - char.height; char.velY = 0; char.onGround = true; }
    if (char.x < 0) char.x = 0; if (char.x + char.width > canvas.width) char.x = canvas.width - char.width;
    if (char.attackTimer > 0) { char.attackTimer--; if (target) checkCollision(char, target, char.isKicking ? 85 : 65); }
    else { char.isKicking = false; char.isPunching = false; }
    if (Math.abs(char.velX) > 0.5) char.walkFrame += 0.25;
}

function drawStickman(char) {
    ctx.save();
    const cx = char.x + char.width/2;
    const footY = char.y + char.height;
    if (char.knockedOut) {
        ctx.translate(cx, footY); ctx.rotate(char.facingRight ? -Math.PI / 2 : Math.PI / 2); ctx.translate(-cx, -footY);
    }
    const headY = char.y + 20, hipY = char.y + 70;

    // 1. Outline (För extra tydlighet)
    ctx.lineCap = 'round';
    ctx.strokeStyle = "white";
    ctx.lineWidth = 16;
    ctx.beginPath(); ctx.moveTo(cx, headY + 10); ctx.lineTo(cx, hipY); ctx.stroke(); // Kropp outline

    // 2. Ben (Byxor)
    ctx.lineWidth = 12;
    ctx.strokeStyle = char.knockedOut ? "#555" : char.kit.pants;
    const lM = char.knockedOut ? 0 : Math.sin(char.walkFrame) * 15;
    [1, -1].forEach(s => {
        ctx.beginPath(); ctx.moveTo(cx, hipY);
        if (char.isKicking && char.facingRight === (s === 1)) {
            const r = char.facingRight ? 45 : -45; ctx.lineTo(cx + r/2, hipY - 5); ctx.lineTo(cx + r, hipY - 5);   
        } else {
            const o = s * lM; ctx.lineTo(cx + o, hipY + 20); ctx.lineTo(cx + o * 1.5, footY);
        }
        ctx.stroke();
    });

    // 3. Bålen (Tröja)
    ctx.lineWidth = 22; // Riktigt fyllig kropp
    ctx.strokeStyle = char.kit.shirt;
    ctx.beginPath(); ctx.moveTo(cx, headY + 10); ctx.lineTo(cx, hipY); ctx.stroke();

    // 4. Armar
    ctx.lineWidth = 10;
    ctx.strokeStyle = char.kit.shirt;
    const aY = headY + 25;
    ctx.beginPath(); ctx.moveTo(cx, aY);
    if (char.isPunching) { const r = char.facingRight ? 45 : -45; ctx.lineTo(cx + r, aY); }
    else { ctx.lineTo(cx - 15, aY + 20); ctx.moveTo(cx, aY); ctx.lineTo(cx + 15, aY + 20); }
    ctx.stroke();

    // 5. Huvudet
    if (char.face.complete) {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, headY, 32, 0, Math.PI*2); ctx.clip();
        if (!char.facingRight) { ctx.translate(cx * 2, 0); ctx.scale(-1, 1); }
        ctx.drawImage(char.face, cx - 35, headY - 35, 70, 70);
        ctx.restore();
    }
    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cA = arenas[arenaIdx];
    if (cA.img && cA.img.complete) ctx.drawImage(cA.img, 0, 0, canvas.width, canvas.height);
    else { ctx.fillStyle = '#333'; ctx.fillRect(0,0, canvas.width, canvas.height); }
    
    ctx.fillStyle = '#555'; ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY); 
    ctx.fillStyle = '#333'; ctx.fillRect(0, groundY, canvas.width, 4);

    if (player && enemy) {
        updateChar(player, enemy); updateChar(enemy, player);
        if (gameActive && (player.health <= 0 || enemy.health <= 0)) {
            gameActive = false; soundBell.play();
            if (player.health <= 0) player.knockedOut = true; else enemy.knockedOut = true;
            setTimeout(() => {
                document.getElementById('gameOverOverlay').style.display = 'flex';
                const win = player.health <= 0 ? enemy.name : player.name;
                document.getElementById('winMessage').innerText = `${win.toUpperCase()} VANN!`;
                document.getElementById('winMessage').style.color = player.health <= 0 ? "red" : "#0070ba";
            }, 1000);
        }
        drawStickman(player); drawStickman(enemy);
    }
    requestAnimationFrame(loop);
}

updateMenu();
loop();
</script>
</body>
</html>
