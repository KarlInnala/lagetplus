<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masen vs Skvadern 2.0 - Fixed Combat</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #game-container { position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { border: 4px solid #444; background: linear-gradient(to bottom, #eee, #fff); display: block; }
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .health-container { width: 300px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 5px; overflow: hidden; position: relative; }
        .health-bar { height: 100%; width: 100%; transition: width 0.2s, background-color 0.3s; }
        #p1Bar, #p2Bar { background-color: #00ff00; }
        .name-label { position: absolute; top: -20px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #gameOverOverlay { display: none; }
        button { padding: 15px 40px; font-size: 24px; font-weight: bold; color: white; background: #0070ba; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, background 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button:hover { background: #00568c; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .controls { color: #888; margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div style="position: relative;">
            <div class="name-label" style="left: 0;">MASEN</div>
            <div class="health-container"><div id="p1Bar" class="health-bar"></div></div>
        </div>
        <div style="position: relative;">
            <div class="name-label" style="right: 0;">SKVADERN</div>
            <div class="health-container"><div id="p2Bar" class="health-bar"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="startOverlay" class="overlay">
        <h1 style="color: #0070ba; font-size: 50px; margin-bottom: 20px;">MASEN VS SKVADERN</h1>
        <button onclick="initGame()">STARTA SPELET</button>
        <div class="controls" style="color: white; margin-top: 30px;">
            Piltangenter: Gå/Hoppa | <strong>A</strong>: Sparka | <strong>S</strong>: Boxas
        </div>
    </div>

    <div id="gameOverOverlay" class="overlay">
        <h1 id="winMessage" style="font-size: 40px; margin-bottom: 20px;"></h1>
        <button onclick="resetGame()">SPELA IGEN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const p1Bar = document.getElementById('p1Bar');
const p2Bar = document.getElementById('p2Bar');

const faceMasen = new Image(); faceMasen.src = 'masen-removebg-preview.png';
const faceSkvader = new Image(); faceSkvader.src = 'skvader-removebg-preview.png';

let gameActive = false;
const gravity = 0.8;
const groundY = canvas.height - 30;

// Håller koll på om tangenten är nertryckt för att förhindra spam
const keysPressed = {};

function createCharacter(x, color, face, isPlayer) {
    return {
        x: x, y: 0, velX: 0, velY: 0,
        width: 40, height: 110,
        health: 100,
        onGround: false,
        facingRight: isPlayer,
        isKicking: false, isPunching: false, attackTimer: 0,
        hasHit: false, // NYTT: Förhindrar flera träffar i samma attack
        color: color, face: face,
        isPlayer: isPlayer,
        walkFrame: 0
    };
}

let player, enemy;
const keys = { left: false, right: false, up: false, a: false, s: false };

window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase();
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === 'ArrowUp') keys.up = true;
    
    // Attacktangenter: Sätt till true bara om de inte redan hölls in
    if (key === 'a' && !keysPressed['a']) { keys.a = true; keysPressed['a'] = true; }
    if (key === 's' && !keysPressed['s']) { keys.s = true; keysPressed['s'] = true; }
});

window.addEventListener('keyup', e => {
    const key = e.key.toLowerCase();
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
    if (e.key === 'ArrowUp') keys.up = false;
    if (key === 'a') { keys.a = false; keysPressed['a'] = false; }
    if (key === 's') { keys.s = false; keysPressed['s'] = false; }
});

function updateBars() {
    p1Bar.style.width = Math.max(0, player.health) + "%";
    p2Bar.style.width = Math.max(0, enemy.health) + "%";
    [player, enemy].forEach((char, i) => {
        const bar = i === 0 ? p1Bar : p2Bar;
        if(char.health < 30) bar.style.backgroundColor = "#ff0000";
        else if(char.health < 60) bar.style.backgroundColor = "#ffff00";
        else bar.style.backgroundColor = "#00ff00";
    });
}

function initGame() {
    player = createCharacter(100, '#0070ba', faceMasen, true);
    enemy = createCharacter(600, '#ff4444', faceSkvader, false);
    updateBars(); 
    gameActive = true;
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('gameOverOverlay').style.display = 'none';
}

function resetGame() {
    initGame();
}

function checkCollision(attacker, defender, range) {
    // Om vi redan har träffat under denna attack-timer, gör inget
    if (attacker.hasHit) return;

    const dist = Math.abs((attacker.x + attacker.width/2) - (defender.x + defender.width/2));
    if (dist < range && Math.abs(attacker.y - defender.y) < 60) {
        defender.health -= attacker.isKicking ? 10 : 5; // Rejälare skada men bara en gång
        
        const kickbackForce = attacker.isKicking ? 20 : 12;
        defender.velX = attacker.facingRight ? kickbackForce : -kickbackForce;
        
        attacker.hasHit = true; // Markera att vi landat en träff
        updateBars();
    }
}

function updateChar(char, target = null) {
    if (!gameActive || char.health <= 0) return;

    if (!char.isPlayer && target) {
        const dist = char.x - target.x;
        if (Math.abs(dist) > 70) {
            char.velX = dist > 0 ? -2.5 : 2.5;
            char.facingRight = dist < 0;
        } else {
            char.velX *= 0.8;
            if (char.attackTimer === 0) {
                if (Math.random() < 0.05) { 
                    char.isPunching = true; 
                    char.attackTimer = 15; 
                    char.hasHit = false; 
                }
                else if (Math.random() < 0.02) { 
                    char.isKicking = true; 
                    char.attackTimer = 25; 
                    char.hasHit = false; 
                }
            }
        }
    } else if (char.isPlayer) {
        char.velX *= 0.8;
        if (keys.left) { char.velX = -6; char.facingRight = false; }
        if (keys.right) { char.velX = 6; char.facingRight = true; }
        if (keys.up && char.onGround) { char.velY = -16; char.onGround = false; }
        
        if (char.attackTimer === 0) {
            if (keys.a) { 
                char.isKicking = true; 
                char.attackTimer = 25; 
                char.hasHit = false; // Reset för ny attack
                keys.a = false; // Tvinga fram nytt tryck
            }
            else if (keys.s) { 
                char.isPunching = true; 
                char.attackTimer = 15; 
                char.hasHit = false; // Reset för ny attack
                keys.s = false; // Tvinga fram nytt tryck
            }
        }
    }

    char.velY += gravity;
    char.x += char.velX;
    char.y += char.velY;

    if (char.y + char.height > groundY) {
        char.y = groundY - char.height;
        char.velY = 0;
        char.onGround = true;
    }

    if (char.x < 0) char.x = 0;
    if (char.x + char.width > canvas.width) char.x = canvas.width - char.width;

    if (char.attackTimer > 0) {
        char.attackTimer--;
        if (target) checkCollision(char, target, char.isKicking ? 85 : 65);
    } else {
        char.isKicking = false;
        char.isPunching = false;
    }

    if (Math.abs(char.velX) > 1) char.walkFrame += 0.2;
}

function drawStickman(char) {
    const cx = char.x + char.width/2;
    const headY = char.y + 20;
    const hipY = char.y + 70;
    const footY = char.y + char.height;
    
    ctx.lineWidth = 5;
    ctx.strokeStyle = char.health > 0 ? '#333' : '#bbb';
    ctx.lineCap = 'round';

    ctx.beginPath(); ctx.moveTo(cx, headY + 15); ctx.lineTo(cx, hipY); ctx.stroke();

    const legMove = Math.sin(char.walkFrame) * 15;
    [1, -1].forEach(side => {
        ctx.beginPath(); ctx.moveTo(cx, hipY);
        if (char.isKicking && char.facingRight === (side === 1)) {
            const reach = char.facingRight ? 45 : -45;
            ctx.lineTo(cx + reach/2, hipY - 5); 
            ctx.lineTo(cx + reach, hipY - 5);   
        } else {
            const offset = side * legMove;
            ctx.lineTo(cx + offset, hipY + 20); 
            ctx.lineTo(cx + offset * 1.5, footY);
        }
        ctx.stroke();
    });

    const armY = headY + 25;
    ctx.beginPath(); ctx.moveTo(cx, armY);
    if (char.isPunching) {
        const reach = char.facingRight ? 45 : -45;
        ctx.lineTo(cx + reach, armY);
    } else {
        ctx.lineTo(cx - 15, armY + 20);
        ctx.moveTo(cx, armY);
        ctx.lineTo(cx + 15, armY + 20);
    }
    ctx.stroke();

    if (char.face.complete) {
        ctx.save();
        ctx.beginPath(); ctx.arc(cx, headY, 28, 0, Math.PI*2); ctx.clip();
        if (!char.facingRight) { ctx.translate(cx * 2, 0); ctx.scale(-1, 1); }
        ctx.drawImage(char.face, cx - 32, headY - 32, 64, 64);
        ctx.restore();
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#444'; ctx.fillRect(0, groundY, canvas.width, 30);
    ctx.fillStyle = '#333'; ctx.fillRect(0, groundY, canvas.width, 4);

    if (gameActive) {
        updateChar(player, enemy);
        updateChar(enemy, player);

        if (player.health <= 0 || enemy.health <= 0) {
            gameActive = false;
            document.getElementById('gameOverOverlay').style.display = 'flex';
            document.getElementById('winMessage').innerText = player.health <= 0 ? "SKVADERN VANN!" : "MASEN VANN!";
            document.getElementById('winMessage').style.color = player.health <= 0 ? "red" : "#0070ba";
        }
    }

    if(player) drawStickman(player);
    if(enemy) drawStickman(enemy);

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
